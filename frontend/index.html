<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARISAI — ذكاء لخدمة الحجاج</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #04070e; color: #ddd; }
        header { background: #0a0f1a; border-bottom: 1px solid #c9a84c33; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #c9a84c; font-size: 22px; font-weight: bold; }
        .arabic { color: #888; font-size: 12px; }
        .status { background: #30d15820; border: 1px solid #30d15850; color: #30d158; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 16px; }
        .card { background: #0a0f1a; border: 1px solid #c9a84c33; border-radius: 10px; padding: 16px; }
        .card h3 { color: #c9a84c; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
        .zone-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #ffffff10; }
        .zone-name { font-size: 12px; }
        .zone-status { padding: 2px 8px; border-radius: 10px; font-size: 10px; }
        .safe { background: #30d15820; color: #30d158; }
        .high { background: #ff950020; color: #ff9500; }
        .critical { background: #ff3b3020; color: #ff3b30; }
        .stat-value { font-size: 36px; font-weight: bold; color: #c9a84c; text-align: center; }
        .stat-label { font-size: 11px; color: #666; margin-top: 4px; text-align: center; }
        .alert-item { padding: 8px; border-radius: 6px; margin-bottom: 6px; font-size: 11px; border-left: 3px solid; }
        .alert-emergency { background: #ff3b3010; border-color: #ff3b30; }
        .alert-info { background: #00d4c810; border-color: #00d4c8; }
        .alert-warning { background: #ff950010; border-color: #ff9500; }
        .webcam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 16px 16px; }
        .cam-card { background: #0a0f1a; border: 1px solid #c9a84c33; border-radius: 10px; padding: 16px; }
        .cam-card h3 { color: #c9a84c; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
        .cam-feed { width: 100%; aspect-ratio: 4/3; background: #020508; border-radius: 8px; border: 1px solid #00d4c833; position: relative; overflow: hidden; }
        #gesture-video, #gesture-canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .gesture-box { margin-top: 12px; padding: 10px; background: #00d4c810; border: 1px solid #00d4c830; border-radius: 8px; text-align: center; }
        .gesture-icon { font-size: 32px; }
        .gesture-name { color: #00d4c8; font-size: 12px; font-weight: bold; margin-top: 4px; }
        .gesture-action { color: #666; font-size: 10px; margin-top: 2px; }
        .start-btn { width: 100%; padding: 10px; background: #00d4c820; border: 1px solid #00d4c8; border-radius: 6px; color: #00d4c8; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .start-btn:hover { background: #00d4c840; }
        #login-screen { position: fixed; inset: 0; background: #04070e; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: #0a0f1a; border: 1px solid #c9a84c50; border-radius: 12px; padding: 40px; width: 320px; text-align: center; }
        .login-box h2 { color: #c9a84c; margin-bottom: 8px; }
        .login-box p { color: #666; font-size: 12px; margin-bottom: 24px; }
        input { width: 100%; padding: 10px; background: #ffffff10; border: 1px solid #c9a84c30; border-radius: 6px; color: #ddd; margin-bottom: 12px; font-size: 13px; }
        button { width: 100%; padding: 10px; background: #c9a84c20; border: 1px solid #c9a84c; border-radius: 6px; color: #c9a84c; font-size: 14px; font-weight: bold; cursor: pointer; }
        button:hover { background: #c9a84c40; }
        #error-msg { color: #ff3b30; font-size: 11px; margin-top: 8px; }
        .lang-bar { display: flex; gap: 8px; padding: 0 16px 16px; flex-wrap: wrap; }
        .lang-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #c9a84c50; background: #c9a84c10; color: #c9a84c; font-size: 11px; cursor: pointer; }
        .lang-btn.active { background: #c9a84c; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>🕌 HARISAI</h2>
        <p>ذكاء لخدمة الحجاج</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="doLogin()">Login</button>
        <div id="error-msg"></div>
    </div>
</div>

<header>
    <div>
        <div class="logo">🕌 HARISAI</div>
        <div class="arabic">ذكاء لخدمة الحجاج</div>
    </div>
    <div class="status">● LIVE</div>
</header>

<div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('English',this)">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('Arabic',this)">🇸🇦 Arabic</button>
    <button class="lang-btn" onclick="setLang('Urdu',this)">🇵🇰 Urdu</button>
    <button class="lang-btn" onclick="setLang('Indonesian',this)">🇮🇩 Indonesian</button>
    <button class="lang-btn" onclick="setLang('Turkish',this)">🇹🇷 Turkish</button>
    <button class="lang-btn" onclick="setLang('French',this)">🇫🇷 French</button>
</div>

<div class="grid">
    <div class="card">
        <h3>📍 Sacred Zones</h3>
        <div id="zones-list">Loading...</div>
    </div>
    <div class="card">
        <h3>📊 Live Stats</h3>
        <div style="padding:20px 0">
            <div class="stat-value" id="total-people">0</div>
            <div class="stat-label">People Detected</div>
        </div>
        <div style="padding:10px 0">
            <div class="stat-value" id="total-alerts" style="color:#ff9500">0</div>
            <div class="stat-label">Active Alerts</div>
        </div>
    </div>
    <div class="card">
        <h3>🔔 Alert Feed</h3>
        <div id="alerts-list">No alerts yet...</div>
    </div>
</div>

<div class="webcam-grid">
    <div class="cam-card">
        <h3>🖐 Gesture Detection — Real MediaPipe AI</h3>
        <div class="cam-feed">
            <video id="gesture-video" playsinline autoplay muted></video>
            <canvas id="gesture-canvas"></canvas>
        </div>
        <div class="gesture-box">
            <div class="gesture-icon" id="g-icon">—</div>
            <div class="gesture-name" id="g-name">Waiting...</div>
            <div class="gesture-action" id="g-action">Show hand to camera</div>
        </div>
        <button class="start-btn" onclick="startGestureCamera()">📷 Start Gesture Camera</button>
    </div>
    <div class="cam-card">
        <h3>👥 Crowd Detection — HOG AI</h3>
        <div class="cam-feed">
            <video id="crowd-video" playsinline autoplay muted style="position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)"></video>
        </div>
        <div class="gesture-box" style="background:#c9a84c10;border-color:#c9a84c30">
            <div class="stat-value" id="crowd-count" style="font-size:28px">0</div>
            <div class="stat-label">People in Frame</div>
        </div>
        <button class="start-btn" style="border-color:#c9a84c;color:#c9a84c;background:#c9a84c10" onclick="startCrowdCamera()">📷 Start Crowd Camera</button>
    </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';

// ── AUTO LOGIN CHECK ──
if (sessionStorage.getItem('harisai_login') === 'yes') {
    document.getElementById('login-screen').style.display = 'none';
    setTimeout(loadDashboard, 100);
}

// ── LOGIN ──
async function doLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    try {
        const res = await fetch(API + '/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.status === 'success') {
            sessionStorage.setItem('harisai_login', 'yes');
            document.getElementById('login-screen').style.display = 'none';
            loadDashboard();
        } else {
            document.getElementById('error-msg').textContent = '❌ Wrong credentials!';
        }
    } catch(e) {
        document.getElementById('error-msg').textContent = '❌ Backend not running!';
    }
}

// ── ZONES ──
async function loadZones() {
    try {
        const res = await fetch(API + '/api/zones');
        const zones = await res.json();
        document.getElementById('zones-list').innerHTML = zones.map(z => `
            <div class="zone-item">
                <div class="zone-name">${z.name}</div>
                <div class="zone-status ${z.status}">${z.status}</div>
            </div>`).join('');
    } catch(e) {}
}

// ── ALERTS ──
async function loadAlerts() {
    try {
        const res = await fetch(API + '/api/alerts');
        const alerts = await res.json();
        if (!alerts.length) {
            document.getElementById('alerts-list').innerHTML = 'No alerts yet...';
            return;
        }
        document.getElementById('alerts-list').innerHTML = alerts.map(a => `
            <div class="alert-item alert-${a.type}">
                <strong>${a.zone}</strong> — ${a.message}
                <div style="color:#666;font-size:10px">${a.time}</div>
            </div>`).join('');
        document.getElementById('total-alerts').textContent = alerts.length;
    } catch(e) {}
}

// ── DASHBOARD ──
function loadDashboard() {
    loadZones(); loadAlerts();
    setInterval(() => { loadZones(); loadAlerts(); }, 5000);
}

// ── VOICE ──
const VOICE_MESSAGES = {
    HELP:     { English:'Help is on its way', Arabic:'المساعدة في الطريق', Urdu:'مدد آ رہی ہے', Indonesian:'Bantuan dalam perjalanan', Turkish:'Yardım yolda', French:'Aide en route' },
    NAVIGATE: { English:'Follow the green path', Arabic:'اتبع الخط الأخضر', Urdu:'سبز راستہ پیروی کریں', Indonesian:'Ikuti jalur hijau', Turkish:'Yeşil yolu takip et', French:'Suivez le chemin vert' },
    LOST:     { English:'Lost pilgrim detected', Arabic:'تم الكشف عن حاج مفقود', Urdu:'گمشدہ حاجی ملا', Indonesian:'Jemaah tersesat', Turkish:'Kayıp hacı bulundu', French:'Pèlerin perdu détecté' },
    SOS:      { English:'Emergency! Help coming!', Arabic:'طوارئ! المساعدة قادمة', Urdu:'ہنگامی حالت! مدد آ رہی ہے', Indonesian:'Darurat! Bantuan datang', Turkish:'Acil! Yardım geliyor', French:'Urgence! Aide en route' }
};

let currentLang = 'English';

function setLang(lang, btn) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function speak(gesture) {
    try {
        window.speechSynthesis.cancel();
        if (!VOICE_MESSAGES[gesture]) return;
        const msg = VOICE_MESSAGES[gesture][currentLang] || VOICE_MESSAGES[gesture].English;
        setTimeout(() => {
            const utter = new SpeechSynthesisUtterance(msg);
            utter.lang = { English:'en-US', Arabic:'ar-SA', Urdu:'ur-PK', Indonesian:'id-ID', Turkish:'tr-TR', French:'fr-FR' }[currentLang] || 'en-US';
            utter.volume = 1;
            utter.rate = 0.9;
            utter.onerror = () => {};
            window.speechSynthesis.speak(utter);
        }, 100);
    } catch(e) {}
}

// ── GESTURE AI ──
const GESTURES = {
    HELP:     { icon:'✋', name:'HELP REQUEST',     action:'Guide dispatched!' },
    NAVIGATE: { icon:'👉', name:'NAVIGATION',       action:'Route activated!' },
    LOST:     { icon:'✌️', name:'LOST PILGRIM',     action:'Group finder ON!' },
    SOS:      { icon:'✊', name:'🚨 EMERGENCY SOS', action:'All units alerted!' },
    NONE:     { icon:'—',  name:'No gesture',        action:'Show hand to camera' }
};

function classifyGesture(landmarks, handLabel) {
    const tips = [8,12,16,20], mcps = [5,9,13,17];
    let closedCount = 0;
    tips.forEach((t,i) => { if (landmarks[t].y > landmarks[mcps[i]].y) closedCount++; });
    if (closedCount === 4) return 'SOS';
    const indexTip = landmarks[8].y, indexPip = landmarks[7].y;
    const middleTip = landmarks[12].y, middleMcp = landmarks[9].y;
    const ringTip = landmarks[16].y, ringMcp = landmarks[13].y;
    const pinkyTip = landmarks[20].y, pinkyMcp = landmarks[17].y;
    if (indexTip < indexPip && middleTip > middleMcp && ringTip > ringMcp && pinkyTip > pinkyMcp) return 'NAVIGATE';
    const iUp = landmarks[8].y < landmarks[6].y;
    const rDn = landmarks[16].y > landmarks[14].y;
    const pDn = landmarks[20].y > landmarks[18].y;
    if (iUp && landmarks[12].y < landmarks[10].y && rDn && pDn) return 'LOST';
    let c = 0;
    if (handLabel === 'Right') { if (landmarks[4].x < landmarks[3].x) c++; }
    else { if (landmarks[4].x > landmarks[3].x) c++; }
    [[8,5],[12,9],[16,13],[20,17]].forEach(([t,b]) => { if (landmarks[t].y < landmarks[b].y) c++; });
    if (c >= 4) return 'HELP';
    return 'NONE';
}

let lastGesture = 'NONE';

function updateGestureUI(key) {
    const g = GESTURES[key] || GESTURES.NONE;
    document.getElementById('g-icon').textContent   = g.icon;
    document.getElementById('g-name').textContent   = g.name;
    document.getElementById('g-action').textContent = g.action;
    if (key !== 'NONE' && key !== lastGesture) {
        lastGesture = key;
        speak(key);
        saveAlert(key);
        setTimeout(() => { lastGesture = 'NONE'; }, 3000);
    }
}

async function saveAlert(gesture) {
    const g = GESTURES[gesture];
    try {
        await fetch(API + '/api/alert/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                type: gesture === 'SOS' ? 'emergency' : 'info',
                message: g.name + ' — ' + g.action,
                zone: 'Camera Zone'
            })
        });
        loadAlerts();
    } catch(e) {}
}

function startGestureCamera() {
    const video  = document.getElementById('gesture-video');
    const canvas = document.getElementById('gesture-canvas');
    const ctx    = canvas.getContext('2d');
    video.addEventListener('loadedmetadata', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    });
    const hands = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.6 });
    hands.onResults(results => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (results.multiHandLandmarks && results.multiHandLandmarks.length) {
            const lms  = results.multiHandLandmarks[0];
            const side = results.multiHandedness[0].label;
            const key  = classifyGesture(lms, side);
            updateGestureUI(key);
            lms.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x * canvas.width, p.y * canvas.height, 5, 0, Math.PI*2);
                ctx.fillStyle = '#00d4c8';
                ctx.fill();
            });
        } else {
            updateGestureUI('NONE');
        }
    });
    const camera = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 640, height: 480
    });
    camera.start();
}

function startCrowdCamera() {
    const video = document.getElementById('crowd-video');
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert('Camera error: ' + err.message));
    setInterval(async () => {
        try {
            const res = await fetch(API + '/api/zones');
            const zones = await res.json();
            const total = zones.reduce((s, z) => s + z.count, 0);
            document.getElementById('crowd-count').textContent = total;
            document.getElementById('total-people').textContent = total;
        } catch(e) {}
    }, 3000);
}
</script>
</body>
</html>
